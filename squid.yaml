manifestVersion: subsquid.io/v0.1
name: origin-squid-notifications
version: 999
description: 'Origin Protocol 🦑 - Notifications'
build:
deploy:
  env:
    TS_NODE_BASEURL: './lib'
  addons:
    postgres:
    rpc:
      - arbitrum-one.http
      - eth.http
      - base.http
      - sonic-mainnet.http
  secrets:
    - RPC_ENDPOINT
    - RPC_ENV
    - RPC_BASE_ENDPOINT
    - RPC_BASE_ENV
    - RPC_SONIC_ENDPOINT
    - RPC_SONIC_ENV
    - ALERT_CONFIG_DB_URL
    - RAILWAY_DATABASE_URL
    - DISCORD_WEBHOOK_URL_TEST
    - DISCORD_WEBHOOK_URL_OGN
    - DISCORD_WEBHOOK_URL_OGN_ALERTS
    - DISCORD_WEBHOOK_URL_OGN_BUYBACKS
    - DISCORD_WEBHOOK_URL_XOGN
    - DISCORD_WEBHOOK_URL_OETH
    - DISCORD_WEBHOOK_URL_SUPER_OETH_B
    - DISCORD_WEBHOOK_URL_OUSD
    - DISCORD_WEBHOOK_URL_PRIME_ETH
    - DISCORD_WEBHOOK_URL_ARM
    - DISCORD_WEBHOOK_URL_OS
    - DISCORD_WEBHOOK_URL_GOVERNANCE
    - ONCALL_WEBHOOK_URL
    - LOKI_URL
    - LOKI_USER
    - LOKI_API_KEY
    - SQUID_TEST_RENDER_TOKEN
  processor:
    - name: mainnet-processor
      cmd: ['sqd', 'process:prod']
    - name: base-processor
      cmd: ['sqd', 'process:base:prod']
      env:
        RPC_ENV_BASE: RPC_BASE_HTTP
    - name: sonic-processor
      cmd: ['sqd', 'process:sonic:prod']
  api:
    cmd:
      - npx
      - squid-graphql-server
      - '--dumb-cache'
      - in-memory
      - '--dumb-cache-ttl'
      - '1000'
      - '--dumb-cache-size'
      - '100'
      - '--dumb-cache-max-age'
      - '1000'
      - '--max-response-size'
      - '1000000'
scale:
  dedicated: true
  addons:
    postgres:
      storage: 100G
      profile: small
